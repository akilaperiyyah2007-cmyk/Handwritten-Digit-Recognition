<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Digit Recognition</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  color: white;
  text-align: center;
}

/* Glass effect */
.container {
  margin: 80px auto;
  width: 350px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* Input */
input {
  width: 80%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  margin-top: 10px;
  text-align: center;
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* Hidden */
.hidden {
  display: none;
}

/* Result card */
.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: white;
  color: black;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">
  <h1>🔐 AI Login</h1>
  <input type="text" id="username" placeholder="Enter your name">
  <br>
  <button onclick="login()">Enter</button>
</div>

<!-- WELCOME -->
<div class="container hidden" id="welcomePage">
  <h1 id="welcomeText"></h1>
  <p>Ready to explore AI Digit Recognition?</p>
  <button onclick="startApp()">Launch</button>
</div>

<!-- MAIN APP -->
<div class="container hidden" id="appPage">
  <h1>🧠 AI Digit Recognition</h1>
  <p>Click to simulate prediction</p>

  <button onclick="predict()">Predict Digit</button>

  <div class="card hidden" id="resultBox">
    <h2>Prediction: <span id="result">?</span></h2>
  </div>
</div>

<script>
function login() {
  let name = document.getElementById("username").value;

  if(name === "") {
    alert("Enter your name!");
    return;
  }

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("welcomePage").classList.remove("hidden");

  document.getElementById("welcomeText").innerText =
    "Welcome " + name + " 🚀";
}

function startApp() {
  document.getElementById("welcomePage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
}

function predict() {
  let digit = Math.floor(Math.random() * 10);
  document.getElementById("result").innerText = digit;
  document.getElementById("resultBox").classList.remove("hidden");
}
</script>

</body>
</html>
