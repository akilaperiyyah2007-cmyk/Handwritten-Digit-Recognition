<!DOCTYPE html>
<html>
<head>
<title>AI Digit Recognition</title>
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
  text-align:center;
}

.container {
  margin:50px auto;
  width:350px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
}

canvas {
  background:white;
  border-radius:10px;
}

button {
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff416c;
  color:white;
}

.card {
  background:white;
  color:black;
  margin-top:15px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🧠 AI Digit Recognition</h2>

<canvas id="canvas" width="280" height="280"></canvas>

<br>
<button onclick="predict()">Predict</button>
<button onclick="clearCanvas()">Clear</button>

<div class="card" id="resultBox" style="display:none;">
  <h3>Prediction: <span id="result"></span></h3>
  <p>Confidence: <span id="confidence"></span>%</p>
</div>
</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=e=>{
  if(!drawing)return;
  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(e.offsetX,e.offsetY,8,0,Math.PI*2);
  ctx.fill();
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function predict(){
  let data = canvas.toDataURL();

  fetch("http://127.0.0.1:5000/predict",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({image:data})
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("result").innerText=data.digit;
    document.getElementById("confidence").innerText=data.confidence.toFixed(2);
    document.getElementById("resultBox").style.display="block";
  });
}
</script>

</body>
</html>
